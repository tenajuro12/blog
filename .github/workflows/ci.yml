name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Go unit tests ──────────────────────────────────────────────────
  backend-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=blogdb_test port=5432 sslmode=disable"
          JWT_SECRET: "ci-test-secret"
        run: |
          go test ./tests/... -v -coverprofile=coverage.out -covermode=atomic

      - name: Show coverage summary
        working-directory: backend
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  # ── Backend: Build check ────────────────────────────────────────────────────
  backend-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build binary
        working-directory: backend
        run: go build -o bin/blog-app ./main.go

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: blog-app-binary
          path: backend/bin/blog-app

  # ── API tests with Newman ───────────────────────────────────────────────────
  api-tests:
    name: Newman API Tests
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=blogdb port=5432 sslmode=disable"
          JWT_SECRET: "ci-test-secret"
          PORT: "8080"
        run: |
          go run main.go &
          echo "Waiting for server to start..."
          for i in {1..15}; do
            curl -s http://localhost:8080/api/posts && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          newman run postman/BlogApp.postman_collection.json \
            --environment postman/BlogApp.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --bail

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html

  # ── Frontend: Build check ───────────────────────────────────────────────────
  frontend-build:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
