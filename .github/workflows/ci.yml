name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=blogdb_test port=5432 sslmode=disable"
          JWT_SECRET: "ci-test-secret"
        run: |
          go test ./tests/... -v -run "^Test[^(Integration|Edge|Concurrency|InvalidBehavior)]" \
            -coverprofile=coverage_unit.out \
            -covermode=atomic \
            -coverpkg=blog-app/handlers,blog-app/utils

      - name: Show unit coverage
        working-directory: backend
        run: go tool cover -func coverage_unit.out | tail -3

      - name: Enforce coverage threshold ≥ 50%
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func coverage_unit.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 50%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% passed"

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage_unit.out

  # ── 2. Integration Tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run integration tests
        working-directory: backend
        env:
          JWT_SECRET: "ci-test-secret"
        run: |
          go test ./tests/... -v -run "^TestIntegration_" \
            -coverprofile=coverage_integration.out \
            -covermode=atomic \
            -coverpkg=blog-app/handlers,blog-app/utils

      - name: Show integration coverage
        working-directory: backend
        run: go tool cover -func coverage_integration.out | tail -3

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: backend/coverage_integration.out

  # ── 3. Edge Case Tests ────────────────────────────────────────────────────────
  edge-tests:
    name: Edge Case Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run edge case tests
        working-directory: backend
        env:
          JWT_SECRET: "ci-test-secret"
        run: |
          go test ./tests/... -v -run "^TestEdge_" \
            -coverprofile=coverage_edge.out \
            -covermode=atomic \
            -coverpkg=blog-app/handlers,blog-app/utils

      - name: Upload edge coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-edge
          path: backend/coverage_edge.out

  # ── 4. Concurrency + Invalid Behavior Tests ───────────────────────────────────
  concurrency-tests:
    name: Concurrency & Invalid Behavior Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run concurrency tests with race detector
        working-directory: backend
        env:
          JWT_SECRET: "ci-test-secret"
        run: |
          go test ./tests/... -v \
            -run "^(TestConcurrency_|TestInvalidBehavior_)" \
            -race \
            -count=1 \
            -timeout=60s

  # ── 5. Build ──────────────────────────────────────────────────────────────────
  backend-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, edge-tests, concurrency-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build binary
        working-directory: backend
        run: go build -o bin/blog-app ./main.go

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: blog-app-binary
          path: backend/bin/blog-app

  # ── 6. API Tests (Newman) ─────────────────────────────────────────────────────
  api-tests:
    name: Newman API + Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=blogdb port=5432 sslmode=disable"
          JWT_SECRET: "ci-test-secret"
          PORT: "8080"
        run: |
          go run main.go &
          echo "Waiting for server..."
          for i in {1..15}; do
            curl -s http://localhost:8080/api/posts && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run all Newman folders
        run: |
          newman run postman/BlogApp.postman_collection.json \
            --environment postman/BlogApp.postman_environment.json \
            --env-var "baseUrl=http://localhost:8080" \
            --env-var "token=" \
            --env-var "postSlug=" \
            --env-var "commentId=" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --bail

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html

  # ── 7. Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ── 8. Notify on failure ──────────────────────────────────────────────────────
  notify-on-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      - edge-tests
      - concurrency-tests
      - backend-build
      - api-tests
      - frontend-build
    if: failure()

    steps:
      - name: Send Telegram alert
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CI Failed — ${{ github.repository }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            Trigger: ${{ github.event_name }}

            Job results:
            unit-tests        → ${{ needs.unit-tests.result }}
            integration-tests → ${{ needs.integration-tests.result }}
            edge-tests        → ${{ needs.edge-tests.result }}
            concurrency-tests → ${{ needs.concurrency-tests.result }}
            backend-build     → ${{ needs.backend-build.result }}
            api-tests         → ${{ needs.api-tests.result }}
            frontend-build    → ${{ needs.frontend-build.result }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
